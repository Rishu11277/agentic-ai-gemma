name: Gemma-4-E4B → ONNX → OpenVINO IR

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -U pip
        pip install "transformers>=4.41.0" accelerate
        pip install "openvino-dev>=2024.4.0"
        pip install huggingface_hub

    - name: HuggingFace Login
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        hf auth login --token "$HF_TOKEN"

    - name: Export Gemma-4-E4B to ONNX
      run: |
        mkdir -p onnx
        python3 - << 'EOF'
from transformers import AutoModelForCausalLM
import torch
from pathlib import Path

model_id = "google/gemma-4-E4B"
print(f"Loading model: {model_id}")
model = AutoModelForCausalLM.from_pretrained(model_id, torch_dtype=torch.float16)

model.eval()
dummy = torch.randint(0, 100, (1, 32))  # [batch=1, seq=32]

onnx_path = Path("onnx/model.onnx")
onnx_path.parent.mkdir(parents=True, exist_ok=True)

print(f"Exporting to ONNX: {onnx_path}")
torch.onnx.export(
    model,
    (dummy,),
    onnx_path.as_posix(),
    input_names=["input_ids"],
    output_names=["logits"],
    opset_version=17,
    dynamic_axes={"input_ids": {0: "batch", 1: "seq"},
                  "logits": {0: "batch", 1: "seq"}},
)
print("ONNX export complete.")
EOF

    - name: Convert ONNX → OpenVINO IR (OVC CLI, no Python)
      run: |
        mkdir -p openvino-ir
        echo "Converting onnx/model.onnx → OpenVINO IR in openvino-ir/"
        ovc --input_model onnx/model.onnx --output_dir openvino-ir
        echo "IR conversion complete."

    - name: Upload IR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gemma-4-E4B-openvino-ir
        path: openvino-ir
