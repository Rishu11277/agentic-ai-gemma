name: Gemma-4-E4B → ONNX → OpenVINO IR (Optimum)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -U pip
        pip install "transformers>=4.41.0" accelerate
        pip install "optimum>=1.20.0" "optimum-intel>=1.17.0"
        pip install "openvino>=2024.4.0"
        pip install huggingface_hub

    - name: HuggingFace Login
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        hf auth login --token "$HF_TOKEN"

    - name: Download Gemma-4-E4B
      run: |
        mkdir -p model
        hf download google/gemma-4-E4B \
          --local-dir model \
          --include "*.safetensors" "*.json"

    - name: Export Gemma-4-E4B → ONNX (Optimum)
      run: |
        mkdir -p onnx
        optimum-cli export onnx \
          --model model \
          onnx

    - name: Convert ONNX → OpenVINO IR (Optimum)
      run: |
        mkdir -p openvino-ir
        optimum-cli export openvino \
          --model onnx \
          openvino-ir

    - name: Upload IR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gemma-4-E4B-openvino-ir
        path: openvino-ir
